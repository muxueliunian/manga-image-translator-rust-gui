name: Run cargo

env:
  CARGO_TERM_COLOR: always

inputs:
  name:
    required: true
  test:
    required: true
  runs-on:
    required: true

runs:
  using: composite
  steps:
    - name: Check formatting
      shell: bash
      run: cargo fmt --all -- --check

    - name: Run tests
      if: inputs.test == true && inputs.runs-on == 'macos-latest'
      shell: bash
      run: cargo test --verbose

    - name: Build release
      if: inputs.runs-on == 'macos-latest' || inputs.runs-on == 'macos-13'
      shell: bash
      run: |
        export OPENCV_LINK_LIBS=opencv_core,opencv_imgproc
        cargo build --release -p dbnet
    - name: Build release
      if: inputs.runs-on != 'macos-latest' && inputs.runs-on != 'macos-13'
      shell: bash
      run: |
        cargo build --release -p dbnet
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: -${{ inputs.name }}
        path: |
          target/release/dbnet
          target/release/dbnet.exe
        retention-days: 5
        if-no-files-found: ignore
