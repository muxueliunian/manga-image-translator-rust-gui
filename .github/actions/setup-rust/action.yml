name: "Setup Rust"

env:
  CARGO_TERM_COLOR: always

runs:
  using: "composite"
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install rustfmt
      shell: bash
      run: rustup component add rustfmt

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
