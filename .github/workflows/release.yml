name: Release Action

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        platform:
          - name: linux-x86_64
            runs-on: ubuntu-22.04
            os: linux
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            os: linux
          - name: macos-arm64
            runs-on: macos-latest
            os: macos
          - name: macos-x86_64
            runs-on: macos-13
            os: macos
          - name: windows-x86_64
            runs-on: windows-latest
            os: windows

    name: Setup on ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runs-on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Linux
        if: matrix.platform.name == 'linux-x86_64' || matrix.platform.name == 'linux-arm64'
        uses: ./.github/actions/setup-linux
        with:
          runs-on: ${{ matrix.platform.runs-on }}

      - name: Setup macOS
        if: matrix.platform.name == 'macos-arm64' || matrix.platform.name == 'macos-x86_64'
        uses: ./.github/actions/setup-macos
        with:
          runs-on: ${{ matrix.platform.runs-on }}

      - name: Setup Windows
        if: matrix.platform.name == 'windows-x86_64'
        uses: ./.github/actions/setup-windows
        with:
          runs-on: ${{ matrix.platform.runs-on }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Set up Pythons
        if: matrix.platform.os != 'windows'
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Setup Python
        id: setup-python
        uses: ./.github/actions/setup-python

      - name: Tests & Building
        uses: ./.github/actions/cargo
        with:
          test: true
          runs-on: ${{ matrix.platform.runs-on }}
          name: ${{ matrix.platform.name }}

      - name: Build wheels
        uses: ./.github/actions/python-build
        with:
          name: ${{ matrix.platform.name }}
          os: ${{ matrix.platform.os }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.name }}
          path: target/wheels/*.whl
          retention-days: 5

  release:
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Prepare Release Files
        run: |
          mkdir release
          cp -- "-linux-x86_64/simple-runtime" release/manga-image-translator-linux-x86_64
          cp -- "-windows-x86_64/simple-runtime.exe" release/manga-image-translator-windows-x86_64.exe
          cp -- "-macos-x86_64/simple-runtime" release/manga-image-translator-macos-x86_64
          cp -- "-linux-arm64/simple-runtime" release/manga-image-translator-linux-arm64
          cp -- "-macos-arm64/simple-runtime" release/manga-image-translator-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/manga-image-translator-*
            wheels-*/rusty_manga_image_translator-*.whl
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PyPI Release
        uses: actions/setup-python@v4
        with:
          python-version: 3.9
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          pip install --upgrade twine
          find wheels-* -name "*.whl" -print0 | xargs -0 twine upload --skip-existing
